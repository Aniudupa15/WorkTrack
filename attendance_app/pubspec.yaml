name: attendance_app
description: "PunchIn — Firebase-powered Workplace Attendance Tracking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0-296.4.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^12.3.6
  firebase_messaging: ^16.1.3
  cloud_functions: ^5.1.5
  firebase_analytics: ^11.3.6

  # ── Maps & Location ─────────────────────────────────────────────────────────
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  geocoding: ^3.0.0

  # ── UI & Utilities ───────────────────────────────────────────────────────────
  provider: ^6.1.5+1
  fl_chart: ^0.69.0
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.1.2
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  uuid: ^4.5.1
  connectivity_plus: ^6.1.3
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.3
  path_provider: ^2.1.4
  share_plus: ^12.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
